<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Photo Gallery & Editor</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
    /* Simple custom style for input range */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: #334155;
      height: 6px;
      border-radius: 3px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      margin-top: -5px;
      background-color: #6366f1;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      transition: all 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background-color: #818cf8;
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans min-h-screen flex flex-col antialiased">

  <!-- Main Navigation Header -->
  <header class="border-b border-slate-800 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex flex-wrap gap-4 items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="p-2.5 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl shadow-lg shadow-indigo-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6 text-white">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent tracking-tight">Lumina</h1>
        <p class="text-xs text-indigo-400 font-medium">Studio Gallery & Editor</p>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="flex items-center gap-3">
      <!-- Upload Trigger -->
      <label for="image-upload" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-800 text-slate-200 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer border border-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        <span>Upload Photo</span>
      </label>
      <input type="file" id="image-upload" accept="image/*" class="hidden" multiple onchange="handleImageUpload(event)">

      <button onclick="triggerResetAll()" class="p-2 bg-slate-800 hover:bg-slate-700 hover:text-red-400 rounded-xl transition-all border border-slate-700" title="Reset Current Image Filters">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Interactive Sandbox Workspace -->
  <main id="drag-container" class="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden h-full">
    
    <!-- Left Panel: Gallery -->
    <section class="lg:col-span-3 border-b lg:border-b-0 lg:border-r border-slate-800 bg-[#0c111e] flex flex-col h-full overflow-hidden min-h-[300px] lg:min-h-0">
      <!-- Gallery Title Area -->
      <div class="p-4 border-b border-slate-800/60 bg-[#0e1424] flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <h2 class="text-sm font-semibold tracking-wide text-slate-300 uppercase">Interactive Gallery</h2>
        </div>
        <span id="gallery-count" class="text-xs bg-slate-800 text-slate-400 px-2.5 py-0.5 rounded-full font-semibold">0 Photos</span>
      </div>

      <!-- Drag & Drop Overlay Info -->
      <div id="drop-zone-tip" class="hidden mx-4 mt-3 p-3 bg-indigo-950/40 border border-indigo-800/40 text-indigo-300 rounded-xl text-xs flex items-center gap-2.5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Tip: Drop files directly anywhere to upload!</span>
      </div>

      <!-- Photo grid -->
      <div id="gallery-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-3 lg:grid-cols-2 gap-3 align-content-start">
        <!-- Dynmically loaded thumbnail cards will go here -->
      </div>
    </section>

    <!-- Center Workspace: Live Canvas & Preview -->
    <section class="lg:col-span-6 bg-[#090d16] p-6 flex flex-col justify-between items-center relative overflow-hidden group min-h-[400px] lg:min-h-0">
      
      <!-- Editor Mode / Status Info Bar -->
      <div class="w-full flex items-center justify-between text-xs text-slate-400 mb-4 bg-slate-900/50 px-4 py-2 rounded-xl backdrop-blur border border-slate-800/50">
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
          <span id="active-filename" class="font-medium truncate max-w-[200px]">No image loaded</span>
        </div>
        <div class="flex items-center gap-4">
          <span id="image-dimensions" class="text-slate-500">- px</span>
          <button id="compare-btn" class="text-indigo-400 font-semibold hover:text-indigo-300 transition select-none cursor-pointer" onmousedown="startComparing()" onmouseup="stopComparing()" onmouseleave="stopComparing()" ontouchstart="startComparing()" ontouchend="stopComparing()">
            Hold to Compare
          </button>
        </div>
      </div>

      <!-- Canvas/Image Workspace Container -->
      <div class="flex-1 w-full flex items-center justify-center relative overflow-hidden rounded-2xl border border-dashed border-slate-800 bg-[#080b12] p-4">
        <!-- Interactive Empty State -->
        <div id="empty-state" class="text-center max-w-sm flex flex-col items-center">
          <div class="w-16 h-16 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center mb-4 text-slate-500 group-hover:text-indigo-400 transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.9 2.9m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
            </svg>
          </div>
          <h3 class="text-lg font-semibold text-slate-200 mb-2">No Image Selected</h3>
          <p class="text-sm text-slate-400 mb-5">Select a photo from the left gallery, or drag & drop a new photo anywhere onto the interface.</p>
          <label for="image-upload-empty" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-semibold cursor-pointer shadow-lg shadow-indigo-600/20 transition duration-150">
            Select file from computer
          </label>
          <input type="file" id="image-upload-empty" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
        </div>

        <!-- Live Preview Image -->
        <div id="preview-wrapper" class="hidden relative max-w-full max-h-[50vh] lg:max-h-[60vh] flex items-center justify-center transition-all">
          <img id="preview-image" src="" alt="Live Preview" class="max-w-full max-h-[50vh] lg:max-h-[60vh] object-contain rounded-lg shadow-2xl transition-all duration-75 select-none" />
          
          <!-- Secondary Hidden Reference for Original/Compare Mode -->
          <img id="original-image-compare" src="" alt="Original Preview" class="absolute inset-0 max-w-full max-h-full object-contain rounded-lg opacity-0 pointer-events-none transition-opacity duration-150" />
        </div>
      </div>

      <!-- Quick Transform Toolbar (Flip & Rotate) -->
      <div id="transform-toolbar" class="hidden mt-4 w-full max-w-md bg-slate-900/60 backdrop-blur border border-slate-800 p-2 rounded-2xl flex items-center justify-around gap-2 shadow-xl">
        <button onclick="applyTransform('rotate-left')" class="p-2.5 rounded-xl text-slate-400 hover:text-indigo-400 hover:bg-slate-800/80 transition-all flex flex-col items-center gap-1 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
          </svg>
          <span class="text-[10px] font-medium">Rotate Left</span>
        </button>

        <button onclick="applyTransform('rotate-right')" class="p-2.5 rounded-xl text-slate-400 hover:text-indigo-400 hover:bg-slate-800/80 transition-all flex flex-col items-center gap-1 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l6-6m0 0l-6-6m6 6H9a6 6 0 000 12h3" />
          </svg>
          <span class="text-[10px] font-medium">Rotate Right</span>
        </button>

        <div class="h-6 w-[1px] bg-slate-800"></div>

        <button onclick="applyTransform('flip-h')" class="p-2.5 rounded-xl text-slate-400 hover:text-indigo-400 hover:bg-slate-800/80 transition-all flex flex-col items-center gap-1 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
          </svg>
          <span class="text-[10px] font-medium">Flip H</span>
        </button>

        <button onclick="applyTransform('flip-v')" class="p-2.5 rounded-xl text-slate-400 hover:text-indigo-400 hover:bg-slate-800/80 transition-all flex flex-col items-center gap-1 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
          </svg>
          <span class="text-[10px] font-medium">Flip V</span>
        </button>
      </div>
    </section>

    <!-- Right Panel: Editor Tooling System -->
    <section class="lg:col-span-3 border-t lg:border-t-0 lg:border-l border-slate-800 bg-[#0c111e] flex flex-col h-full overflow-hidden">
      <!-- Tab System Header -->
      <div class="flex border-b border-slate-800/60 bg-[#0e1424] shrink-0">
        <button onclick="switchEditorTab('presets')" id="tab-presets" class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-indigo-500 text-indigo-400 transition-all">
          Presets
        </button>
        <button onclick="switchEditorTab('adjust')" id="tab-adjust" class="flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all">
          Adjustments
        </button>
      </div>

      <!-- Scrollable Controller Panel -->
      <div class="flex-1 overflow-y-auto p-5 space-y-6">
        
        <!-- PRESETS MODULE -->
        <div id="panel-presets" class="space-y-4">
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1">One-Click Filters</h3>
          <div class="grid grid-cols-2 gap-3">
            <button onclick="applyPreset('normal')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-slate-200">Normal</div>
              <div class="text-[10px] text-slate-500">Original photo state</div>
            </button>
            <button onclick="applyPreset('vintage')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-amber-300">Vintage</div>
              <div class="text-[10px] text-slate-500">Warm nostaglia sepia</div>
            </button>
            <button onclick="applyPreset('noir')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-slate-400">Noir</div>
              <div class="text-[10px] text-slate-500">Deep B&W contrast</div>
            </button>
            <button onclick="applyPreset('vibrant')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-indigo-400">Vibrant</div>
              <div class="text-[10px] text-slate-500">Punchy color boost</div>
            </button>
            <button onclick="applyPreset('warm')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-orange-400">Warm</div>
              <div class="text-[10px] text-slate-500">Golden hour glow</div>
            </button>
            <button onclick="applyPreset('cool')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-sky-400">Cool</div>
              <div class="text-[10px] text-slate-500">Chilly ambient air</div>
            </button>
            <button onclick="applyPreset('dramatic')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-rose-400">Dramatic</div>
              <div class="text-[10px] text-slate-500">High contrast mystery</div>
            </button>
            <button onclick="applyPreset('retro')" class="preset-btn group relative overflow-hidden rounded-xl bg-[#111928] border border-slate-800 p-2.5 text-left hover:border-slate-700 transition duration-150">
              <div class="text-sm font-semibold text-teal-400">Cyberpunk</div>
              <div class="text-[10px] text-slate-500">Neon hue dynamics</div>
            </button>
          </div>
        </div>

        <!-- ADJUSTMENTS SLIDERS MODULE -->
        <div id="panel-adjust" class="hidden space-y-5">
          <!-- Brightness -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-brightness" class="font-medium text-slate-300">Brightness</label>
              <span id="val-brightness" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">100%</span>
            </div>
            <input type="range" id="slider-brightness" min="0" max="200" value="100" class="w-full" oninput="updateFilterVal('brightness')">
          </div>

          <!-- Contrast -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-contrast" class="font-medium text-slate-300">Contrast</label>
              <span id="val-contrast" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">100%</span>
            </div>
            <input type="range" id="slider-contrast" min="0" max="200" value="100" class="w-full" oninput="updateFilterVal('contrast')">
          </div>

          <!-- Saturation -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-saturation" class="font-medium text-slate-300">Saturation</label>
              <span id="val-saturation" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">100%</span>
            </div>
            <input type="range" id="slider-saturation" min="0" max="200" value="100" class="w-full" oninput="updateFilterVal('saturation')">
          </div>

          <!-- Sepia -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-sepia" class="font-medium text-slate-300">Sepia</label>
              <span id="val-sepia" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">0%</span>
            </div>
            <input type="range" id="slider-sepia" min="0" max="100" value="0" class="w-full" oninput="updateFilterVal('sepia')">
          </div>

          <!-- Grayscale -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-grayscale" class="font-medium text-slate-300">Grayscale</label>
              <span id="val-grayscale" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">0%</span>
            </div>
            <input type="range" id="slider-grayscale" min="0" max="100" value="0" class="w-full" oninput="updateFilterVal('grayscale')">
          </div>

          <!-- Blur -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-blur" class="font-medium text-slate-300">Blur</label>
              <span id="val-blur" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">0px</span>
            </div>
            <input type="range" id="slider-blur" min="0" max="20" value="0" class="w-full" oninput="updateFilterVal('blur')">
          </div>

          <!-- Hue Rotate -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-hue-rotate" class="font-medium text-slate-300">Hue Rotate</label>
              <span id="val-hue-rotate" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">0°</span>
            </div>
            <input type="range" id="slider-hue-rotate" min="0" max="360" value="0" class="w-full" oninput="updateFilterVal('hue-rotate')">
          </div>

          <!-- Invert -->
          <div class="space-y-1.5">
            <div class="flex justify-between items-center text-xs">
              <label for="slider-invert" class="font-medium text-slate-300">Invert</label>
              <span id="val-invert" class="font-semibold text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded">0%</span>
            </div>
            <input type="range" id="slider-invert" min="0" max="100" value="0" class="w-full" oninput="updateFilterVal('invert')">
          </div>
        </div>

      </div>

      <!-- Action Panel Footer -->
      <div class="p-5 border-t border-slate-800 bg-[#0b0f19] shrink-0 space-y-3">
        <!-- Save Changes to Gallery -->
        <button onclick="saveEditsToGallery()" id="save-gallery-btn" disabled class="w-full py-3 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 font-semibold rounded-xl text-sm transition-all hover:bg-indigo-600 hover:text-white hover:border-transparent active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Save to Session Gallery
        </button>

        <!-- Download Finished Image -->
        <button onclick="downloadEditedImage()" id="download-btn" disabled class="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-semibold rounded-xl text-sm transition-all shadow-lg hover:shadow-emerald-500/20 active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
          </svg>
          Download Master File
        </button>
      </div>
    </section>

  </main>

  <!-- Interactive Modal System -->
  <div id="toast-notification" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300 ease-out bg-slate-900 border border-slate-800 text-slate-100 px-4 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 max-w-sm pointer-events-none">
    <div id="toast-icon-wrapper" class="p-1.5 rounded-lg bg-emerald-500/15 text-emerald-400">
      <svg id="toast-success-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>
    <p id="toast-text" class="text-xs font-semibold tracking-wide text-slate-300"></p>
  </div>

  <!-- Offscreen Canvas for Export Rendering (Keeps quality pristine) -->
  <canvas id="export-canvas" class="hidden"></canvas>

  <script>
    // --- Data Definitions ---
    const DEFAULT_FILTERS = {
      brightness: 100,
      contrast: 100,
      saturation: 100,
      sepia: 0,
      grayscale: 0,
      blur: 0,
      'hue-rotate': 0,
      invert: 0
    };

    const PRESETS = {
      normal: { ...DEFAULT_FILTERS },
      vintage: { ...DEFAULT_FILTERS, sepia: 65, contrast: 90, brightness: 95 },
      noir: { ...DEFAULT_FILTERS, grayscale: 100, contrast: 155, brightness: 85 },
      vibrant: { ...DEFAULT_FILTERS, saturation: 175, contrast: 110 },
      warm: { ...DEFAULT_FILTERS, sepia: 30, saturation: 130, 'hue-rotate': 350 },
      cool: { ...DEFAULT_FILTERS, saturation: 90, 'hue-rotate': 25, brightness: 105 },
      dramatic: { ...DEFAULT_FILTERS, contrast: 165, brightness: 80, saturation: 125 },
      retro: { ...DEFAULT_FILTERS, 'hue-rotate': 130, saturation: 150, contrast: 115 }
    };

    // Store sample images or local uploaded ones
    let gallery = [
      {
        id: "sample-1",
        name: "Neon Nights.jpg",
        url: "https://images.unsplash.com/photo-1515621061946-eff1c2a352bd?auto=format&fit=crop&w=800&q=80",
        filters: { ...DEFAULT_FILTERS },
        rotation: 0,
        flipH: false,
        flipV: false
      },
      {
        id: "sample-2",
        name: "Emerald Forest.jpg",
        url: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=800&q=80",
        filters: { ...DEFAULT_FILTERS },
        rotation: 0,
        flipH: false,
        flipV: false
      },
      {
        id: "sample-3",
        name: "Mountain Mist.jpg",
        url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80",
        filters: { ...DEFAULT_FILTERS },
        rotation: 0,
        flipH: false,
        flipV: false
      }
    ];

    let activeImageId = null;
    let currentFilters = { ...DEFAULT_FILTERS };
    let currentTransform = { rotation: 0, flipH: false, flipV: false };
    let currentTab = 'presets';

    // Elements
    const galleryGrid = document.getElementById('gallery-grid');
    const galleryCount = document.getElementById('gallery-count');
    const emptyState = document.getElementById('empty-state');
    const previewWrapper = document.getElementById('preview-wrapper');
    const previewImg = document.getElementById('preview-image');
    const originalImg = document.getElementById('original-image-compare');
    const activeFilename = document.getElementById('active-filename');
    const imageDimensions = document.getElementById('image-dimensions');
    const transformToolbar = document.getElementById('transform-toolbar');
    const downloadBtn = document.getElementById('download-btn');
    const saveGalleryBtn = document.getElementById('save-gallery-btn');
    const dragContainer = document.getElementById('drag-container');
    const dropZoneTip = document.getElementById('drop-zone-tip');

    // Initialize Web App
    window.onload = function() {
      renderGallery();
      setupDragAndDrop();
    };

    // --- Render System ---
    function renderGallery() {
      galleryGrid.innerHTML = '';
      galleryCount.textContent = `${gallery.length} Photo${gallery.length !== 1 ? 's' : ''}`;

      gallery.forEach((photo) => {
        const isSelected = photo.id === activeImageId;
        const card = document.createElement('div');
        card.className = `group relative aspect-square rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 border-2 ${
          isSelected 
            ? 'border-indigo-500 ring-4 ring-indigo-500/10' 
            : 'border-slate-800 hover:border-slate-700'
        } bg-slate-900`;

        // Assemble filter style applied to thumbnail
        const f = photo.filters;
        const filterStr = `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%) sepia(${f.sepia}%) grayscale(${f.grayscale}%) blur(${f.blur}px) hue-rotate(${f['hue-rotate']}deg) invert(${f.invert}%)`;
        
        // Assemble transform style for thumbnail
        let transformStr = `rotate(${photo.rotation}deg)`;
        if (photo.flipH) transformStr += ` scaleX(-1)`;
        if (photo.flipV) transformStr += ` scaleY(-1)`;

        card.innerHTML = `
          <!-- Thumbnail Image -->
          <img src="${photo.url}" 
               alt="${photo.name}" 
               onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80'"
               style="filter: ${filterStr}; transform: ${transformStr};" 
               class="w-full h-full object-cover select-none transition-all duration-300">
          
          <!-- Hover overlay gradient -->
          <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
            <span class="text-[10px] text-white font-medium truncate mb-2">${photo.name}</span>
          </div>

          <!-- Delete Action Icon -->
          <button onclick="event.stopPropagation(); deletePhoto('${photo.id}')" 
                  class="absolute top-2.5 right-2.5 p-1.5 bg-slate-950/80 backdrop-blur rounded-xl text-slate-400 hover:text-red-400 opacity-0 group-hover:opacity-100 hover:scale-105 active:scale-95 transition-all duration-200" 
                  title="Remove Image">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
          </button>
        `;

        card.addEventListener('click', () => selectPhoto(photo.id));
        galleryGrid.appendChild(card);
      });
    }

    // --- Tab Controller System ---
    function switchEditorTab(tab) {
      currentTab = tab;
      
      const tabPresets = document.getElementById('tab-presets');
      const tabAdjust = document.getElementById('tab-adjust');
      const panelPresets = document.getElementById('panel-presets');
      const panelAdjust = document.getElementById('panel-adjust');

      if (tab === 'presets') {
        tabPresets.className = "flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-indigo-500 text-indigo-400 transition-all";
        tabAdjust.className = "flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
        panelPresets.classList.remove('hidden');
        panelAdjust.classList.add('hidden');
      } else {
        tabPresets.className = "flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
        tabAdjust.className = "flex-1 py-3 text-xs font-semibold uppercase tracking-wider text-center border-b-2 border-indigo-500 text-indigo-400 transition-all";
        panelPresets.classList.add('hidden');
        panelAdjust.classList.remove('hidden');
      }
    }

    // --- App Logic & Triggers ---
    function selectPhoto(id) {
      activeImageId = id;
      const photo = gallery.find(p => p.id === id);
      if (!photo) return;

      // Populate filters and transformations
      currentFilters = { ...photo.filters };
      currentTransform = {
        rotation: photo.rotation,
        flipH: photo.flipH,
        flipV: photo.flipV
      };

      // Set original src for comparison and live editable src
      previewImg.src = photo.url;
      originalImg.src = photo.url;

      // Update UI Header details
      activeFilename.textContent = photo.name;
      
      // Clear visual constraints and let dimensions resolve
      previewImg.onload = function() {
        imageDimensions.textContent = `${previewImg.naturalWidth} x ${previewImg.naturalHeight} px`;
      };

      // Render modifications
      syncSlidersUI();
      applyFiltersAndTransformsToDOM();

      // Show core interface sections
      emptyState.classList.add('hidden');
      previewWrapper.classList.remove('hidden');
      transformToolbar.classList.remove('hidden');
      downloadBtn.removeAttribute('disabled');
      saveGalleryBtn.removeAttribute('disabled');

      renderGallery();
    }

    function deletePhoto(id) {
      gallery = gallery.filter(p => p.id !== id);
      if (activeImageId === id) {
        activeImageId = null;
        // Revert workspace to empty state
        previewImg.src = '';
        originalImg.src = '';
        emptyState.classList.remove('hidden');
        previewWrapper.classList.add('hidden');
        transformToolbar.classList.add('hidden');
        downloadBtn.setAttribute('disabled', 'true');
        saveGalleryBtn.setAttribute('disabled', 'true');
        activeFilename.textContent = "No image loaded";
        imageDimensions.textContent = "- px";
      }
      renderGallery();
      showToast("Photo deleted successfully.");
    }

    function handleImageUpload(event) {
      const files = event.target.files;
      if (!files.length) return;

      let importedCount = 0;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const reader = new FileReader();

        reader.onload = function(e) {
          const newPhoto = {
            id: 'local-' + Date.now() + '-' + Math.random().toString(36).substring(2, 9),
            name: file.name,
            url: e.target.result,
            filters: { ...DEFAULT_FILTERS },
            rotation: 0,
            flipH: false,
            flipV: false
          };
          gallery.push(newPhoto);
          importedCount++;

          // Auto-select the last/newly uploaded single item
          if (importedCount === files.length) {
            renderGallery();
            selectPhoto(newPhoto.id);
            showToast(`Loaded ${files.length} custom file(s).`);
          }
        };

        reader.readAsDataURL(file);
      }
      // Reset targets
      event.target.value = '';
    }

    // --- Drag and Drop File Handlers ---
    function setupDragAndDrop() {
      // Handle document level drag & drop to make it ultra premium
      window.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZoneTip.classList.remove('hidden');
      });

      window.addEventListener('dragleave', (e) => {
        if (e.clientX === 0 && e.clientY === 0) { // true leave window
          dropZoneTip.classList.add('hidden');
        }
      });

      window.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZoneTip.classList.add('hidden');
        
        const files = e.dataTransfer.files;
        if (files && files.length > 0) {
          // Wrap into mimicking input event
          const pseudoEvent = { target: { files: files } };
          handleImageUpload(pseudoEvent);
        }
      });
    }

    // --- Filter Realtime Engine ---
    function updateFilterVal(filterKey) {
      const slider = document.getElementById(`slider-${filterKey}`);
      const valDisplay = document.getElementById(`val-${filterKey}`);
      if (!slider) return;

      let val = slider.value;
      currentFilters[filterKey] = parseInt(val);

      // Append measurements properly
      let unit = '%';
      if (filterKey === 'blur') unit = 'px';
      if (filterKey === 'hue-rotate') unit = '°';
      
      valDisplay.textContent = `${val}${unit}`;
      applyFiltersAndTransformsToDOM();
    }

    function applyPreset(presetKey) {
      const presetData = PRESETS[presetKey];
      if (!presetData) return;

      currentFilters = { ...presetData };
      syncSlidersUI();
      applyFiltersAndTransformsToDOM();
      showToast(`Applied preset: ${presetKey.toUpperCase()}`);
    }

    function syncSlidersUI() {
      // Sync sliders and dynamic displays in Adjust Tab
      Object.keys(currentFilters).forEach(key => {
        const slider = document.getElementById(`slider-${key}`);
        const display = document.getElementById(`val-${key}`);
        if (slider && display) {
          slider.value = currentFilters[key];
          
          let unit = '%';
          if (key === 'blur') unit = 'px';
          if (key === 'hue-rotate') unit = '°';
          display.textContent = `${currentFilters[key]}${unit}`;
        }
      });
    }

    function applyTransform(type) {
      if (!activeImageId) return;

      if (type === 'rotate-left') {
        currentTransform.rotation = (currentTransform.rotation - 90) % 360;
      } else if (type === 'rotate-right') {
        currentTransform.rotation = (currentTransform.rotation + 90) % 360;
      } else if (type === 'flip-h') {
        currentTransform.flipH = !currentTransform.flipH;
      } else if (type === 'flip-v') {
        currentTransform.flipV = !currentTransform.flipV;
      }

      applyFiltersAndTransformsToDOM();
    }

    function applyFiltersAndTransformsToDOM() {
      // Build CSS filter string
      const f = currentFilters;
      const filterStr = `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%) sepia(${f.sepia}%) grayscale(${f.grayscale}%) blur(${f.blur}px) hue-rotate(${f['hue-rotate']}deg) invert(${f.invert}%)`;
      previewImg.style.filter = filterStr;

      // Build CSS transform matrix
      let transformStr = `rotate(${currentTransform.rotation}deg)`;
      if (currentTransform.flipH) transformStr += ` scaleX(-1)`;
      if (currentTransform.flipV) transformStr += ` scaleY(-1)`;
      previewImg.style.transform = transformStr;
    }

    // --- Compare System (Original vs Adjusted) ---
    function startComparing() {
      if (!activeImageId) return;
      originalImg.style.opacity = '1';
    }

    function stopComparing() {
      if (!activeImageId) return;
      originalImg.style.opacity = '0';
    }

    // Trigger complete revert to standard
    function triggerResetAll() {
      if (!activeImageId) return;
      currentFilters = { ...DEFAULT_FILTERS };
      currentTransform = { rotation: 0, flipH: false, flipV: false };
      syncSlidersUI();
      applyFiltersAndTransformsToDOM();
      showToast("Returned image adjustments to original parameters.");
    }

    // Save Edits to Session Store Gallery
    function saveEditsToGallery() {
      if (!activeImageId) return;

      const photoIndex = gallery.findIndex(p => p.id === activeImageId);
      if (photoIndex === -1) return;

      // Commit to local session storage
      gallery[photoIndex].filters = { ...currentFilters };
      gallery[photoIndex].rotation = currentTransform.rotation;
      gallery[photoIndex].flipH = currentTransform.flipH;
      gallery[photoIndex].flipV = currentTransform.flipV;

      renderGallery();
      showToast("Edits saved back to your live gallery!");
    }

    // --- High Fidelity Canvas Baking & Export System ---
    function downloadEditedImage() {
      if (!activeImageId) return;

      const photo = gallery.find(p => p.id === activeImageId);
      if (!photo) return;

      // Master Image instantiation for drawing on offscreen canvas
      const img = new Image();
      img.crossOrigin = 'anonymous'; // Avoid tainted canvas problems
      img.src = photo.url;

      showToast("Baking master rendering... Please wait.");

      img.onload = function() {
        const canvas = document.getElementById('export-canvas');
        const ctx = canvas.getContext('2d');

        const originalWidth = img.naturalWidth;
        const originalHeight = img.naturalHeight;

        // Account for rotation geometry changes
        const rotated = (currentTransform.rotation / 90) % 2 !== 0;
        const targetWidth = rotated ? originalHeight : originalWidth;
        const targetHeight = rotated ? originalWidth : originalHeight;

        canvas.width = targetWidth;
        canvas.height = targetHeight;

        // Clear canvas cleanly
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Apply HTML5 Canvas context filter modifiers
        const f = currentFilters;
        ctx.filter = `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturation}%) sepia(${f.sepia}%) grayscale(${f.grayscale}%) blur(${f.blur}px) hue-rotate(${f['hue-rotate']}deg) invert(${f.invert}%)`;

        // Apply transformations (Scale & Rotation mapping coordinates around the center point)
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate((currentTransform.rotation * Math.PI) / 180);
        
        const scaleX = currentTransform.flipH ? -1 : 1;
        const scaleY = currentTransform.flipV ? -1 : 1;
        ctx.scale(scaleX, scaleY);

        // Draw image aligned center-to-center
        ctx.drawImage(img, -originalWidth / 2, -originalHeight / 2, originalWidth, originalHeight);

        // Export as High-Quality JPEG
        try {
          // Use standard download technique
          const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
          const link = document.createElement('a');
          
          // Construct clean filename matching output details
          const originalName = photo.name.substring(0, photo.name.lastIndexOf('.')) || photo.name;
          link.download = `${originalName}-lumina-edit.jpg`;
          link.href = dataUrl;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          showToast("Photo processed and downloaded!");
        } catch (error) {
          console.error("Canvas export error:", error);
          showToast("Security error baking remote image. Try using local uploads!");
        }
      };

      img.onerror = function() {
        showToast("Error loading base source image for canvas processing.");
      };
    }

    // --- Interactive Toast Engine ---
    function showToast(text) {
      const toast = document.getElementById('toast-notification');
      const toastText = document.getElementById('toast-text');
      
      toastText.textContent = text;
      
      // Animate up
      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      // Dismiss after 3.2s
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3200);
    }
  </script>
</body>
